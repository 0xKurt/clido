# V1 Definition of Done — machine-readable checklist (detailed).
# Source plan: v1.md. Run scripts/verify-dod.sh to verify; generate *-dod.md with scripts/generate-dod-md.sh.
release: v1
source_plan: v1.md

items:
  # --- Build and test (v1.md Exit Criteria; development-plan Phase 1-3, 5.4.2) ---
  - id: build
    description: "Workspace builds for all targets"
    source: "v1.md Exit Criteria; development-plan Phase 1-3"
    verification:
      type: command
      command: "cargo build --all-targets"
    status: DONE

  - id: tests
    description: "All workspace tests pass"
    source: "v1.md Exit Criteria; development-plan Phase 5.4.2"
    verification:
      type: command
      command: "cargo test --workspace"
    status: DONE

  - id: coverage-workspace
    description: "Workspace line coverage >= 70% (per-crate floors: clido-agent 70%, clido-providers 75%, clido-context 70%, clido-tools 80%, clido-storage 75%)"
    source: "v1.md Exit Criteria; development-plan Phase 5.4.2"
    verification:
      type: coverage
      scope: workspace
      min_percent: 70
    status: DONE

  - id: integration-tests
    description: "Integration tests pass (clido_help_exits_zero, clido_init_exits_zero, clido_doctor_runs)"
    source: "v1.md Exit Criteria; development-plan Phase 5.4"
    verification:
      type: command
      command: "cargo test -p clido-cli --test integration"
    status: DONE

